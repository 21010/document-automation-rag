services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    networks:
      - rag-net
    restart: unless-stopped

  ollama-pull:
    image: docker.io/ollama/ollama:latest
    container_name: ollama-pull
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command: -c "while ! ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull nomic-embed-text"
    depends_on:
      - ollama
    networks:
      - rag-net

  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - rag-net
    restart: unless-stopped

  rag-invoice-api:
    build: .
    container_name: rag-invoice-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/rag_db
      - OPENAI_EMBEDDING_BASE_URL=http://ollama:11434/v1
      - OPENAI_EMBEDDING_MODEL=nomic-embed-text
    volumes:
      - ./data:/app/data
    networks:
      - rag-net
    depends_on:
      postgres:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  rag-net:
    driver: bridge
